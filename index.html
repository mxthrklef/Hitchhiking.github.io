<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Title</title>
        <link rel="stylesheet" href="styles.css" />
        <script src="script.js"></script>
    </head>
    <body>
        <div class = contain >
        <div class = flex >
            
        <div class =div1>
        <button class="title" onclick="openCity(event, 'home')">Title</button>

        </div>
            
        <div class =div2>
          <button class="tablinks" onclick="openCity(event, 'info')">info</button>
        </div>
                
        <!--<div class =div3>-->
        <div id = home class =tabcontent>
        <img class="tablinks" onclick="openCity(event, 'start')" src = "titleimg.png" style="cursor:pointer;">
        </div><!--tabcontent-->
        <!--</div>div2-->
        
        <div id = info class =tabcontent style = "display:none;">
            <p>click on title to go back</p>
            <p>click on image to start</p>
        </div>
        
        <div id = start class =tabcontent style= "display:none;">
        <img src ="intro.png">
        <a href = "hmain.html">start</a>
        </div>
            
        </div>
        </div>
    </body>

</html>

    <style>
    
        body{
            background-image: url(bgtitle.png);
        }
        
        .flex{
            height:90vh;
            display: flex;
            flex-direction: column;
            text-align: center;
            /*background-color: blue;*/
                
        }
        .div1{
            max-height: 20vh;
            /*background-color: yellow;*/
        }
        
        .div3{
            display:flex;
            max-height: 70vh;
            flex-shrink: 2;
            /*background-color: green;*/
            margin:auto;
            align-items:center;
            text-align: center;
        }

        .tabcontent{
            display:flex;
            max-height: 70vh;
            flex-shrink: 2;
            /*background-color: green;*/
            margin:auto;
            align-items:center;
            flex-direction: column;
            text-align: center;
        }
        
        img{
            max-height: 80%;
        }
        
        .div1 button{
            font-size: min(5vw, 7rem);
        }
        .div2 button{
            font-size: min(1vw, 7rem);
        }
        
        p{
            font-size: min(1vw, 7rem);
        }
    </style>

    <script>
    function openCity(evt, cityName) {
      var i, tabcontent, tablinks;
      tabcontent = document.getElementsByClassName("tabcontent");
      for (i = 0; i < tabcontent.length; i++) {
        tabcontent[i].style.display = "none";
      }
      tablinks = document.getElementsByClassName("tablinks");
      for (i = 0; i < tablinks.length; i++) {
        tablinks[i].className = tablinks[i].className.replace(" active", "");
      }
      document.getElementById(cityName).style.display = "flex";
      evt.currentTarget.className += " active";
    }
    </script>
